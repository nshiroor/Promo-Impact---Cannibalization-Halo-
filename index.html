document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"ff4ed8b3-d2e1-4ba7-9501-0cd91272e937\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n@font-face{font-family:'Montserrat';src:url(\"4652be3a-1c99-4588-816b-f32666adadfb\") format('truetype');font-weight:100 900;font-style:normal;font-display:swap}\n@font-face{font-family:'Montserrat';src:url(\"4b4ed663-7bd4-4efc-895d-d63b94c0745c\") format('truetype');font-weight:100 900;font-style:italic;font-display:swap}\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{background:#ffffff;font-family:'Roboto','Segoe UI','Helvetica Neue',Arial,sans-serif;color:#333a41;-webkit-font-smoothing:antialiased}\ninput[type=range]{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:#dfe2e6;outline:none;cursor:pointer}\ninput[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:17px;height:17px;border-radius:50%;background:#0092da;border:2px solid #fff;box-shadow:0 1px 3px rgba(15,53,63,.35);cursor:pointer}\ninput[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#0092da;border:2px solid #fff;cursor:pointer}\nselect{font-family:inherit}\n.dc-info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;margin-left:5px;font-size:10px;line-height:1;color:#9aa1a8;cursor:help}\n.dc-info .dc-tooltip{position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);width:190px;background:#333a41;color:#fff;font-size:10px;font-weight:500;line-height:1.4;padding:8px 10px;border-radius:6px;opacity:0;visibility:hidden;transition:opacity .15s;pointer-events:none;z-index:40;text-align:left;white-space:normal}\n.dc-info .dc-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#333a41}\n.dc-info:hover .dc-tooltip{opacity:1;visibility:visible}\n::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cdd2d6;border-radius:5px}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:1240px;margin:0 auto;padding:26px 28px 60px\">\n\n  <!-- App header -->\n  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px\">\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <div style=\"font-size:14px;font-weight:700;letter-spacing:-.01em;color:#333a41\">Promotion Impact — Cannibalization &amp; Halo<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ PANEL 1 · PROMOTION ============ -->\n  <section data-screen-label=\"Promotion\" style=\"background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(15,53,63,.05);margin-bottom:16px\">\n    <div style=\"display:flex;align-items:center;gap:8px;padding:10px 14px;margin:12px 12px 0;background:#f4f4f4;border-radius:10px\">\n      <span style=\"font-size:14px;font-weight:700;color:#333a41\">Promotion<\u002Fspan>\n      <span style=\"color:#b3b9bf;font-weight:600;font-size:10px\">›<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"padding:16px 14px 18px\">\n      <div style=\"display:grid;grid-template-columns:1.3fr 1.3fr 1fr 1fr;gap:14px;align-items:stretch\">\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:13px 15px;text-align:center\">\n          <label style=\"display:block;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#0092da;margin-bottom:6px\">Campaign<\u002Flabel>\n          <select value=\"{{ campaign }}\" onchange=\"{{ onCampaign }}\" style=\"width:100%;height:40px;padding:0 12px;border:1px solid #cfd4d9;border-radius:8px;background:#fff;font-size:10px;font-weight:600;color:#333a41;text-align:center\">\n            <sc-for list=\"{{ campaigns }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <option value=\"{{ c }}\">{{ c }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:13px 15px;text-align:center\">\n          <div style=\"font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#0092da;margin-bottom:5px\">Promoted item<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:700;color:#333a41\">{{ promoTitle }}<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:500;color:#667079;margin-top:3px\">{{ promoSub }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:13px 15px;text-align:center\">\n          <div style=\"font-size:10px;font-weight:600;color:#868d94\">Bundle discount<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;color:#333a41;margin-top:3px;text-align:center\">{{ promoDiscount }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:13px 15px;text-align:center\">\n          <div style=\"font-size:10px;font-weight:600;color:#868d94\">Promo window<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:700;color:#333a41;margin-top:5px;text-align:center\">{{ promoWindow }}<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:500;color:#667079;text-align:center\">{{ promoRegion }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============ PANEL 2 · PARAMETERS ============ -->\n  <section data-screen-label=\"Parameters\" style=\"background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(15,53,63,.05);margin-bottom:16px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin:12px 12px 0;background:#f4f4f4;border-radius:10px\">\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <span style=\"font-size:14px;font-weight:700;color:#333a41\">Parameters<\u002Fspan>\n        \n      <\u002Fdiv>\n      <span style=\"font-size:10px;font-weight:600;font-style:italic;color:#868d94\">{{ previewText }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"padding:14px 18px 16px\">\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:0 18px\">\n        <!-- Correlation threshold -->\n        <div>\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px\">\n            <label style=\"font-size:10px;font-weight:700;color:#333a41;display:flex;align-items:center\">Correlation threshold<span class=\"dc-info\">&#9432;<span class=\"dc-tooltip\">Items below this are excluded from the analysis.<\u002Fspan><\u002Fspan><\u002Flabel>\n            <span style=\"font-size:10px;font-weight:700;color:#0092da\">{{ dCorrText }}<\u002Fspan>\n          <\u002Fdiv>\n          <input type=\"range\" min=\"0\" max=\"1\" step=\"0.01\" value=\"{{ dCorr }}\" oninput=\"{{ onCorr }}\" style=\"width:100%\">\n        <\u002Fdiv>\n        <!-- Discount depth -->\n        <div>\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px\">\n            <label style=\"font-size:10px;font-weight:700;color:#333a41;display:flex;align-items:center\">Promo discount depth<span class=\"dc-info\">&#9432;<span class=\"dc-tooltip\">Deeper discounts lift volume but sharpen cannibalization.<\u002Fspan><\u002Fspan><\u002Flabel>\n            <span style=\"font-size:10px;font-weight:700;color:#0092da\">{{ dDiscountText }}<\u002Fspan>\n          <\u002Fdiv>\n          <input type=\"range\" min=\"5\" max=\"45\" step=\"1\" value=\"{{ dDiscount }}\" oninput=\"{{ onDiscount }}\" style=\"width:100%\">\n        <\u002Fdiv>\n        <!-- Spend -->\n        <div>\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px\">\n            <label style=\"font-size:10px;font-weight:700;color:#333a41;display:flex;align-items:center\">Promotion spend<span class=\"dc-info\">&#9432;<span class=\"dc-tooltip\">Total marketing investment behind the campaign.<\u002Fspan><\u002Fspan><\u002Flabel>\n            <span style=\"font-size:10px;font-weight:700;color:#0092da\">{{ dSpendText }}<\u002Fspan>\n          <\u002Fdiv>\n          <input type=\"range\" min=\"50000\" max=\"400000\" step=\"10000\" value=\"{{ dSpend }}\" oninput=\"{{ onSpend }}\" style=\"width:100%\">\n        <\u002Fdiv>\n        <!-- Margin erosion target -->\n        <div>\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px\">\n            <label style=\"font-size:10px;font-weight:700;color:#333a41;display:flex;align-items:center\">Margin erosion target<span class=\"dc-info\">&#9432;<span class=\"dc-tooltip\">Max acceptable margin loss before an alert fires.<\u002Fspan><\u002Fspan><\u002Flabel>\n            <span style=\"font-size:10px;font-weight:700;color:#0092da\">{{ dMarginText }}<\u002Fspan>\n          <\u002Fdiv>\n          <input type=\"range\" min=\"2\" max=\"12\" step=\"0.5\" value=\"{{ dMargin }}\" oninput=\"{{ onMargin }}\" style=\"width:100%\">\n        <\u002Fdiv>\n        <!-- Cross-border leakage threshold -->\n        <div>\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px\">\n            <label style=\"font-size:10px;font-weight:700;color:#333a41;display:flex;align-items:center\">Cross-border leakage<span class=\"dc-info\">&#9432;<span class=\"dc-tooltip\">Alert when demand shifts across borders beyond this.<\u002Fspan><\u002Fspan><\u002Flabel>\n            <span style=\"font-size:10px;font-weight:700;color:#0092da\">{{ dXbText }}<\u002Fspan>\n          <\u002Fdiv>\n          <input type=\"range\" min=\"1\" max=\"10\" step=\"0.5\" value=\"{{ dXb }}\" oninput=\"{{ onXb }}\" style=\"width:100%\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:16px;margin-top:16px;padding-top:13px;border-top:1px solid #edeef0;flex-wrap:wrap\">\n        <label style=\"font-size:10px;font-weight:700;color:#333a41;display:flex;align-items:center;white-space:nowrap\">Cannibalization scope<span class=\"dc-info\">&#9432;<span class=\"dc-tooltip\">Which transfer types to count as cannibalization.<\u002Fspan><\u002Fspan><\u002Flabel>\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:#333a41;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ scopeProduct }}\" onchange=\"{{ toggleProduct }}\" style=\"width:14px;height:14px;accent-color:#0092da;cursor:pointer\">Same product<\u002Flabel>\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:#333a41;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ scopePortfolio }}\" onchange=\"{{ togglePortfolio }}\" style=\"width:14px;height:14px;accent-color:#0092da;cursor:pointer\">Portfolio<\u002Flabel>\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:#333a41;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ scopeChannel }}\" onchange=\"{{ toggleChannel }}\" style=\"width:14px;height:14px;accent-color:#0092da;cursor:pointer\">Channel<\u002Flabel>\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:#333a41;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ scopeTiming }}\" onchange=\"{{ toggleTiming }}\" style=\"width:14px;height:14px;accent-color:#0092da;cursor:pointer\">Timing<\u002Flabel>\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:#333a41;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ scopeRetailer }}\" onchange=\"{{ toggleRetailer }}\" style=\"width:14px;height:14px;accent-color:#0092da;cursor:pointer\">Retailer<\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:10px 16px;border-top:1px solid #e8eaed;background:#f8f9fa\">\n      <span style=\"font-size:10px;font-weight:600;color:{{ pendingColor }}\">{{ pendingText }}<\u002Fspan>\n      <button onclick=\"{{ onApply }}\" style=\"{{ applyStyle }}\">Apply<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PANEL 3 · PRODUCT RELATIONSHIP ============ -->\n  <section data-screen-label=\"Product Relationship\" style=\"background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(15,53,63,.05);margin-bottom:16px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin:12px 12px 0;background:#f4f4f4;border-radius:10px\">\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <span style=\"font-size:14px;font-weight:700;color:#333a41\">Product Relationship<\u002Fspan>\n        \n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;font-size:10px;font-weight:600;color:#667079\">\n        <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#5dcd95\"><\u002Fspan>Halo<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#d14949\"><\u002Fspan>Cannibalization<\u002Fspan>\n        <span style=\"color:#868d94\">{{ relIncludedText }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- column headers -->\n    <div style=\"display:grid;grid-template-columns:170px 1fr 130px 140px 120px 120px;background:#f4f4f4;border-radius:10px;font-size:12px;font-weight:600;color:#4a5058;margin:20px 12px 0\">\n      <div style=\"padding:10px 14px\">Correlation<\u002Fdiv>\n      <div style=\"padding:10px 14px\">Related item<\u002Fdiv>\n      <div style=\"padding:10px 14px\">Relationship<\u002Fdiv>\n      <div style=\"padding:10px 14px\">Type<\u002Fdiv>\n      <div style=\"padding:10px 14px;text-align:right\">Volume Δ<\u002Fdiv>\n      <div style=\"padding:10px 14px;text-align:right\">$ impact<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-height:340px;overflow-y:auto;padding:0 12px 12px\">\n      <sc-for list=\"{{ rel }}\" as=\"it\" hint-placeholder-count=\"7\">\n        <div style=\"display:grid;grid-template-columns:170px 1fr 130px 140px 120px 120px;opacity:{{ it.rowOpacity }};transition:opacity .15s\">\n          <div style=\"padding:11px 14px;display:flex;align-items:center;gap:10px\">\n            <span style=\"font-size:10px;font-weight:700;color:{{ it.corrColor }};width:32px\">{{ it.corrText }}<\u002Fspan>\n            <div style=\"flex:1\">{{ it.bar }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:11px 14px\">\n            <div style=\"font-size:10px;font-weight:600;color:{{ it.nameColor }}\">{{ it.name }}<\u002Fdiv>\n            <div style=\"font-size:10px;font-weight:500;color:#868d94\">{{ it.code }} · {{ it.dimLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:11px 14px;display:flex;align-items:center;gap:8px\">{{ it.spark }}<span style=\"font-size:10px;font-weight:500;color:#868d94\">{{ it.fitLabel }}<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:11px 14px;display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:600;color:#4a5058;white-space:nowrap\"><span style=\"width:11px;height:11px;border-radius:3px;background:{{ it.typeSquare }};flex:none\"><\u002Fspan>{{ it.typeLabel }}<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:11px 14px;text-align:right;font-size:10px;font-weight:600;color:{{ it.deltaColor }};display:flex;align-items:center;justify-content:flex-end\">{{ it.volText }}<\u002Fdiv>\n          <div style=\"padding:11px 14px;text-align:right;font-size:10px;font-weight:700;color:{{ it.deltaColor }};display:flex;align-items:center;justify-content:flex-end\">{{ it.dollarText }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============ PANEL 4 · OUTPUT ============ -->\n  <section data-screen-label=\"Output\" style=\"background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(15,53,63,.05)\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin:12px 12px 0;background:#f4f4f4;border-radius:10px\">\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <span style=\"font-size:14px;font-weight:700;color:#333a41\">Output<\u002Fspan>\n        \n      <\u002Fdiv>\n      <span style=\"font-size:10px;font-weight:700;color:#5dcd95;opacity:{{ justAppliedOpacity }}\">✓ Updated from applied parameters<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"padding:16px 14px 18px\">\n      <!-- KPI cards -->\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:16px\">\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:15px;text-align:center\">\n          <div style=\"font-size:12px;font-weight:600;color:#667079;margin-bottom:6px\">Promotion ROI<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;color:#333a41;letter-spacing:-.01em\">{{ roiText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:15px;text-align:center\">\n          <div style=\"font-size:12px;font-weight:600;color:#667079;margin-bottom:6px\">Net $ impact<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;color:{{ netColor }};letter-spacing:-.01em\">{{ netText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:15px;text-align:center\">\n          <div style=\"font-size:12px;font-weight:600;color:#667079;margin-bottom:6px\">Cannibalization %<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;color:#d14949;letter-spacing:-.01em\">{{ cannibText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:15px;text-align:center\">\n          <div style=\"font-size:12px;font-weight:600;color:#667079;margin-bottom:6px\">Avg confidence<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;color:#333a41;letter-spacing:-.01em\">{{ confText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f5f7f9;border:1px solid #e4e7ea;border-radius:10px;padding:15px;text-align:center\">\n          <div style=\"font-size:12px;font-weight:600;color:#667079;margin-bottom:6px\">Margin erosion<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;color:{{ marginFg }};letter-spacing:-.01em\">{{ marginValText }}<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:500;color:#868d94;margin-top:4px\">{{ marginNote }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- item table -->\n      <div>\n        <div style=\"display:grid;grid-template-columns:44px 1fr 150px 110px 120px 140px;background:#f4f4f4;border-radius:10px;font-size:12px;font-weight:600;color:#4a5058\">\n          <div style=\"padding:10px 0;display:flex;align-items:center;justify-content:center\"><input type=\"checkbox\" checked=\"{{ allSelected }}\" onchange=\"{{ toggleAll }}\" title=\"Select all\" style=\"width:16px;height:16px;accent-color:#0092da;cursor:pointer\"><\u002Fdiv>\n          <div style=\"padding:10px 14px\">Item<\u002Fdiv>\n          <div style=\"padding:10px 14px\">Type<\u002Fdiv>\n          <div style=\"padding:10px 14px;text-align:right\">Correlation<\u002Fdiv>\n          <div style=\"padding:10px 14px;text-align:right\">Volume Δ<\u002Fdiv>\n          <div style=\"padding:10px 14px;text-align:right\">$ impact<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:44px 1fr 150px 110px 120px 140px;background:#f2f8fc;margin-top:6px;border-radius:8px\">\n          <div style=\"padding:11px 0;display:flex;align-items:center;justify-content:center\"><input type=\"checkbox\" checked=\"{{ true }}\" disabled=\"{{ true }}\" title=\"Promoted item — always included\" style=\"width:16px;height:16px;accent-color:#0092da\"><\u002Fdiv>\n          <div style=\"padding:11px 14px;font-size:10px;font-weight:700;color:#333a41\">{{ promoTitle }} <span style=\"font-size:10px;font-weight:600;color:#0092da\">· promoted<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:11px 14px;display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:600;color:#4a5058;white-space:nowrap\"><span style=\"width:11px;height:11px;border-radius:3px;background:#0092da;flex:none\"><\u002Fspan>Base uplift<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:11px 14px;text-align:right;font-size:10px;color:#868d94\">—<\u002Fdiv>\n          <div style=\"padding:11px 14px;text-align:right;font-size:10px;font-weight:600;color:#5dcd95\">{{ promoVolText }}<\u002Fdiv>\n          <div style=\"padding:11px 14px;text-align:right;font-size:10px;font-weight:700;color:#5dcd95;background:#fbf8e3;border-radius:0 8px 8px 0\">{{ promoNetText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ tItems }}\" as=\"r\" hint-placeholder-count=\"9\">\n          <div style=\"display:grid;grid-template-columns:44px 1fr 150px 110px 120px 140px\">\n            <div style=\"padding:11px 0;display:flex;align-items:center;justify-content:center\"><input type=\"checkbox\" checked=\"{{ r.selected }}\" onchange=\"{{ r.onToggle }}\" style=\"width:16px;height:16px;accent-color:#0092da;cursor:pointer\"><\u002Fdiv>\n            <div style=\"padding:11px 14px\"><div style=\"font-size:10px;font-weight:600;color:#0092da\">{{ r.name }}<\u002Fdiv>\n            <div style=\"font-size:10px;font-weight:500;color:#868d94\">{{ r.code }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:11px 14px;display:flex;align-items:center\"><span style=\"display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:600;color:#4a5058;white-space:nowrap\"><span style=\"width:11px;height:11px;border-radius:3px;background:{{ r.typeSquare }};flex:none\"><\u002Fspan>{{ r.typeLabel }}<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:11px 14px;text-align:right;font-size:10px;font-weight:600;color:#333a41\">{{ r.corrText }}<\u002Fdiv>\n            <div style=\"padding:11px 14px;text-align:right;font-size:10px;font-weight:600;color:{{ r.deltaColor }}\">{{ r.volText }}<\u002Fdiv>\n            <div style=\"padding:11px 14px;text-align:right;font-size:10px;font-weight:700;color:{{ r.deltaColor }};background:#fbf8e3\">{{ r.dollarText }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"display:grid;grid-template-columns:44px 1fr 150px 110px 120px 140px;background:#f4f4f4;margin-top:6px;border-radius:10px\">\n          <div><\u002Fdiv>\n          <div style=\"padding:12px 14px;font-size:10px;font-weight:700;color:#333a41\">Net impact ({{ tCountText }})<\u002Fdiv>\n          <div><\u002Fdiv>\n          <div><\u002Fdiv>\n          <div style=\"padding:12px 14px;text-align:right;font-size:10px;font-weight:700;color:{{ netColor }}\">{{ tVolTotalText }}<\u002Fdiv>\n          <div style=\"padding:12px 14px;text-align:right;font-size:14px;font-weight:800;color:{{ netColor }};background:#f5eec9;border-radius:0 10px 10px 0\">{{ netText }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 18px;border-top:1px solid #e8eaed;background:#f8f9fa\">\n      <span style=\"font-size:10px;font-weight:600;color:#5dcd95;opacity:{{ publishedOpacity }}\">{{ publishText }}<\u002Fspan>\n      <div style=\"display:flex;gap:10px;margin-left:auto\">\n        <button onclick=\"{{ onCancel }}\" style=\"height:40px;padding:0 22px;border-radius:6px;border:1px solid #cfd4d9;background:#fff;color:#333a41;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer\">Cancel<\u002Fbutton>\n        <div style=\"position:relative\">\n          <div style=\"display:inline-flex;border-radius:6px;overflow:hidden;box-shadow:0 1px 2px rgba(20,90,140,.28)\">\n            <button onclick=\"{{ onPublish }}\" title=\"Publish to collaboration workbench\" style=\"height:40px;padding:0 22px;border:none;background:#0092da;color:#fff;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer\">Publish<\u002Fbutton>\n            <button onclick=\"{{ toggleMenu }}\" title=\"Publish to collaboration workbench\" style=\"width:34px;border:none;border-left:1px solid rgba(255,255,255,.32);background:#0092da;color:#fff;font-size:10px;cursor:pointer\">▾<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;right:0;bottom:calc(100% + 6px);width:230px;background:#fff;border:1px solid #dfe2e6;border-radius:8px;box-shadow:0 8px 24px rgba(20,40,60,.16);overflow:hidden;z-index:20\">\n              <button onclick=\"{{ onPublishAll }}\" style=\"display:block;width:100%;text-align:left;padding:11px 14px;border:none;border-bottom:1px solid #edeef0;background:#fff;color:#333a41;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer\" style-hover=\"background:#f2f8fc\">Publish all<\u002Fbutton>\n              <button onclick=\"{{ onPublishFilter }}\" style=\"display:block;width:100%;text-align:left;padding:11px 14px;border:none;background:#fff;color:#333a41;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer\" style-hover=\"background:#f2f8fc\">Publish by filter<\u002Fbutton>\n              <div style=\"padding:8px 14px;background:#f8f9fa;border-top:1px solid #edeef0;font-size:10px;font-weight:500;color:#868d94\">Publishes to the collaboration workbench.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text\u002Fx-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1240, &quot;height&quot;: 1400 },\n  &quot;initCorrThreshold&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 0.5, &quot;min&quot;: 0, &quot;max&quot;: 1, &quot;step&quot;: 0.01, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Defaults&quot; },\n  &quot;initDiscountDepth&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 20, &quot;min&quot;: 5, &quot;max&quot;: 45, &quot;step&quot;: 1, &quot;unit&quot;: &quot;%&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Defaults&quot; },\n  &quot;initSpend&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 150000, &quot;min&quot;: 50000, &quot;max&quot;: 400000, &quot;step&quot;: 10000, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Defaults&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const p = props || {};\n    const applied = {\n      corr: p.initCorrThreshold ?? 0.50,\n      discount: p.initDiscountDepth ?? 20,\n      spend: p.initSpend ?? 150000,\n      marginTarget: 6, xborder: 5,\n      scopes:{ product:true, portfolio:true, channel:true, timing:true, retailer:true } };\n    this.state = {\n      campaign:'Autumn-Ready Travel System — Sept 2026',\n      applied,\n      draft: this.clone(applied),\n      justApplied:false,\n      published:false,\n      publishAt:'',\n      deselected:{}\n    };\n    this.campaigns = [\n      'Autumn-Ready Travel System — Sept 2026',\n      'Spring Stroller Event — 2026',\n      'Car Seat Safety Week — 2026',\n      'Accessory Bundle Push — Q2 2026'\n    ];\n    \u002F\u002F Base figures calibrated at 20% discount depth.\n    this.items = [\n      {corr:0.93, name:'Fox 5 Renew 2in1 Stroller Heritage Black (standalone)',        code:'ITEM-113', type:'C', dim:'product',   baseVol:-8800, baseDollar:-224000},\n      {corr:0.90, name:'Turtle Air Shield Infant Car Seat Deep Indigo (standalone)',   code:'ITEM-101', type:'C', dim:'product',   baseVol:-7600, baseDollar:-196000},\n      {corr:0.89, name:'Adapter Kit Fox Black',                                        code:'ITEM-151', type:'H', dim:'accessory',  baseVol: 9600, baseDollar: 148000},\n      {corr:0.82, name:'Fox 5 Renew 2in1 Stroller Desert Taupe (standalone)',          code:'ITEM-114', type:'C', dim:'product',   baseVol:-4200, baseDollar:-118000},\n      {corr:0.81, name:'Turtle Air Extra Base Car Seat Base',                          code:'ITEM-103', type:'H', dim:'accessory',  baseVol: 6100, baseDollar:  96000},\n      {corr:0.77, name:'Turtle Air Shield Infant Car Seat Grey Melange (standalone)',  code:'ITEM-102', type:'C', dim:'product',   baseVol:-3400, baseDollar: -92000},\n      {corr:0.75, name:'Cup Holder Universal Black',                                    code:'ITEM-141', type:'H', dim:'accessory',  baseVol: 5200, baseDollar:  27600},\n      {corr:0.71, name:'Donkey 6 Travel System Bundle Black',                          code:'ITEM-106', type:'C', dim:'portfolio', baseVol:-2900, baseDollar:-104000},\n      {corr:0.70, name:'Sun Canopy Extendable Black',                                   code:'ITEM-143', type:'H', dim:'accessory',  baseVol: 4700, baseDollar:  33900},\n      {corr:0.68, name:'Pull-forward of Dec full-price Fox 5 demand',                   code:'TM-107',   type:'C', dim:'timing',    baseVol:-3300, baseDollar:-104000},\n      {corr:0.66, name:'Kangaroo Travel System Bundle Grey',                           code:'ITEM-108', type:'C', dim:'portfolio', baseVol:-2300, baseDollar: -78000},\n      {corr:0.63, name:'Seat Liner Breathable Grey',                                    code:'ITEM-142', type:'H', dim:'accessory',  baseVol: 3800, baseDollar:  24700},\n      {corr:0.60, name:'Dragonfly Plus Travel System Bundle Black',                    code:'ITEM-105', type:'C', dim:'portfolio', baseVol:-1900, baseDollar: -64000},\n      {corr:0.57, name:'Organizer Bag Deluxe Black',                                    code:'ITEM-140', type:'H', dim:'accessory',  baseVol: 2900, baseDollar:  22400},\n      {corr:0.54, name:'Butterfly 2 Travel System Bundle Black',                       code:'ITEM-109', type:'C', dim:'portfolio', baseVol:-1400, baseDollar: -41000},\n      {corr:0.49, name:'Babylist Inc marketplace resale',                               code:'CP__10',   type:'C', dim:'retailer',  baseVol:-1600, baseDollar: -37000},\n      {corr:0.48, name:'Rain Cover Universal Clear',                                    code:'ITEM-146', type:'H', dim:'accessory',  baseVol: 2200, baseDollar:  14800},\n      {corr:0.40, name:'El Corte Inglés retail-partner car seat range',                 code:'CP__05',   type:'C', dim:'channel',   baseVol:-1800, baseDollar: -28900},\n      {corr:0.35, name:'Footmuff Fleece Black',                                         code:'ITEM-144', type:'H', dim:'accessory',  baseVol: 1400, baseDollar:  11200}\n    ];\n    this.dimLabels = {product:'Product cannibalization', portfolio:'Portfolio cannibalization', channel:'Channel cannibalization', timing:'Timing cannibalization', retailer:'Retailer cannibalization', accessory:'Accessory halo'};\n  }\n\n  clone(o){ return JSON.parse(JSON.stringify(o)); }\n\n  toggleSel(code){ this.setState(s => ({ deselected: {...s.deselected, [code]: !s.deselected[code]} })); }\n  toggleAllSel(inc, allSelected){\n    this.setState(() => {\n      const d = {};\n      if(allSelected){ inc.forEach(it => { d[it.code] = true; }); }\n      return { deselected: d };\n    });\n  }\n\n  setDraft(key, val){ this.setState(s => ({ draft: {...s.draft, [key]: val} })); }\n  toggleScope(dim){ this.setState(s => ({ draft: {...s.draft, scopes: {...s.draft.scopes, [dim]: !s.draft.scopes[dim]} } })); }\n\n  isDirty(s){ return JSON.stringify(s.draft) !== JSON.stringify(s.applied); }\n\n  apply(){ this.setState(s => ({ applied: this.clone(s.draft), justApplied:true }));\n    clearTimeout(this._t); this._t = setTimeout(()=>this.setState({justApplied:false}), 2200); }\n  cancel(){ this.setState(s => ({ draft: this.clone(s.applied), published:false, publishAt:'', menuOpen:false })); }\n  publish(mode){ this.setState(s => ({ applied: this.clone(s.draft), published:true, menuOpen:false,\n    publishAt: (mode==='filter' ? 'filtered set · ' : 'all items · ') + new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) })); }\n\n  factor(p, isCannib){ return Math.pow(p.discount\u002F20, isCannib ? 1.5 : 0.85); }\n  included(it, p){ return it.corr >= p.corr && (it.type==='H' || p.scopes[it.dim]); }\n\n  \u002F\u002F spark node\n  spark(it){\n    const rising = it.type==='H';\n    const yS = rising ? 26 : 9, yE = rising ? 4 : 27;\n    const jit = [0,1.4,-1.1,0.8,-1.3,0.7,-0.9,0.2];\n    const strength = (1 - it.corr) * 4.2;\n    const dots = [];\n    for(let i=0;i<8;i++){\n      const x = 3 + i*7.7;\n      const y = yS + (yE-yS)*(i\u002F7) + jit[i]*strength;\n      dots.push(React.createElement('circle',{key:i,cx:x,cy:Math.max(2,Math.min(28,y)),r:1.6,fill:'#c2c6ca'}));\n    }\n    const line = React.createElement('path',{key:'l',d:`M3,${yS} L57,${yE}`,fill:'none',stroke: rising?'#5dcd95':'#d14949',strokeWidth:1.7});\n    return React.createElement('svg',{viewBox:'0 0 60 30',width:60,height:30,style:{display:'block'}},[...dots,line]);\n  }\n  bar(it, thr){\n    const isC = it.type==='C';\n    const fill = React.createElement('div',{key:'f',style:{position:'absolute',left:0,top:0,height:'100%',width:(it.corr*100)+'%',background:isC?'#d14949':'#5dcd95',borderRadius:'3px'}});\n    const marker = React.createElement('div',{key:'m',title:'Correlation threshold',style:{position:'absolute',left:(thr*100)+'%',top:'-3px',height:'12px',width:'2px',background:'#333a41',borderRadius:'1px',transform:'translateX(-1px)',zIndex:2}});\n    const track = React.createElement('div',{key:'t',style:{position:'relative',height:'6px',background:'#e5e7ea',borderRadius:'3px',width:'100%'}},[fill,marker]);\n    return track;\n  }\n\n  fmtSigned(n){ const r=Math.round(n); return (r<0?'-$':'+$')+Math.abs(r).toLocaleString(); }\n  fmtVol(n){ const r=Math.round(n); return (r<0?'−':'+')+Math.abs(r).toLocaleString(); }\n  fmtMoney(n){ return '$'+Math.round(n).toLocaleString(); }\n\n  renderVals(){\n    const s = this.state, ap = s.applied, dr = s.draft;\n\n    \u002F\u002F ---- Product Relationship : ranked by correlation, highlighted LIVE from draft ----\n    const relSorted = [...this.items].sort((a,b)=>b.corr-a.corr);\n    let relIncl = 0;\n    const rel = relSorted.map(it => {\n      const inc = this.included(it, dr);\n      if(inc) relIncl++;\n      const isC = it.type==='C';\n      const f = this.factor(dr, isC);\n      const dollar = it.baseDollar*f, vol = it.baseVol*f;\n      \u002F\u002F reason a row is excluded — for the muted label\n      return {\n        corrText: it.corr.toFixed(2),\n        corrColor: inc ? '#333a41' : '#a3a9af',\n        bar: this.bar(it, dr.corr), spark: this.spark(it),\n        name: it.name, code: it.code, dimLabel: this.dimLabels[it.dim],\n        nameColor: inc ? '#0092da' : '#a3a9af',\n        fitLabel: isC ? 'declines' : 'lifts',\n        typeLabel: isC ? 'Cannibalization' : 'Halo',\n        typeSquare: isC ? '#d14949' : '#5dcd95',\n        deltaColor: inc ? (isC ? '#d14949' : '#5dcd95') : '#a3a9af',\n        volText: this.fmtVol(vol), dollarText: this.fmtSigned(dollar),\n        rowOpacity: inc ? '1' : '0.55'\n      };\n    });\n\n    \u002F\u002F ---- Output computation (applied) ----\n    const inc = this.items.filter(it => this.included(it, ap));\n    let halo=0, cannib=0, volTotal=0, corrSum=0;\n    inc.forEach(it => {\n      const isC = it.type==='C';\n      const f = this.factor(ap, isC);\n      const d = it.baseDollar*f;\n      volTotal += it.baseVol*f;\n      corrSum += it.corr;\n      if(isC) cannib += d; else halo += d;\n    });\n    const bundleNet = 700000 * Math.pow(ap.discount\u002F20, 0.7);\n    const bundleVol = 21000 * Math.pow(ap.discount\u002F20, 0.75);\n    const net = bundleNet + halo + cannib;\n    const roi = ap.spend>0 ? (net\u002Fap.spend)*100 : 0;\n    const cannibPct = (bundleNet+halo)>0 ? Math.abs(cannib)\u002F(bundleNet+halo)*100 : 0;\n    const conf = inc.length>0 ? (corrSum\u002Finc.length)*100 : 0;\n    const marginErosion = 3.4 * Math.pow(ap.discount\u002F20, 1.35);\n    const xbLeak = 2.2 + 1.4*(ap.discount\u002F20);\n\n    \u002F\u002F table: included items sorted by $ impact desc\n    const tItems = inc.map(it => {\n      const isC = it.type==='C'; const f = this.factor(ap, isC);\n      return { it, dollar: it.baseDollar*f, vol: it.baseVol*f,\n        name: it.name, code: it.code, corrText: it.corr.toFixed(2),\n        typeLabel: isC?'Cannibalization':'Halo',\n        typeSquare: isC?'#d14949':'#5dcd95',\n        deltaColor: isC?'#d14949':'#5dcd95' };\n    }).sort((a,b)=>b.dollar-a.dollar)\n      .map(r => ({...r, volText:this.fmtVol(r.vol), dollarText:this.fmtSigned(r.dollar),\n        selected: !s.deselected[r.code],\n        onToggle: () => this.toggleSel(r.code) }));\n    const allSelected = tItems.length>0 && tItems.every(r => r.selected);\n\n    \u002F\u002F ---- Draft preview counts ----\n    const previewIncl = this.items.filter(it => this.included(it, dr)).length;\n    const dirty = this.isDirty(s);\n\n    const marginOk = marginErosion <= ap.marginTarget;\n    const xbOk = xbLeak <= ap.xborder;\n\n    return {\n      \u002F\u002F promotion\n      campaign: s.campaign, campaigns: this.campaigns,\n      onCampaign: e => this.setState({campaign:e.target.value}),\n      promoTitle: '107 — Fox 5 Renew Travel System Bundle Graphite',\n      promoSub: 'Fox 5 Renew 2in1 stroller + Turtle Air Shield by Nuna car seat',\n      promoDiscount: ap.discount+'%',\n      promoWindow: 'Aug 31 – Oct 4, 2026',\n      promoRegion: 'Global · DTC + Retail',\n\n      \u002F\u002F relationship\n      rel, relIncludedText: relIncl+' of '+this.items.length+' fit at ≥ '+dr.corr.toFixed(2),\n\n      \u002F\u002F parameter controls (draft)\n      dCorr: dr.corr, dCorrText: dr.corr.toFixed(2),\n      dDiscount: dr.discount, dDiscountText: dr.discount+'%',\n      dSpend: dr.spend, dSpendText: this.fmtMoney(dr.spend),\n      dMargin: dr.marginTarget, dMarginText: dr.marginTarget+'%',\n      dXb: dr.xborder, dXbText: dr.xborder+'%',\n      onCorr: e => this.setDraft('corr', parseFloat(e.target.value)),\n      onDiscount: e => this.setDraft('discount', parseInt(e.target.value)),\n      onSpend: e => this.setDraft('spend', parseInt(e.target.value)),\n      onMargin: e => this.setDraft('marginTarget', parseFloat(e.target.value)),\n      onXb: e => this.setDraft('xborder', parseFloat(e.target.value)),\n      toggleProduct: () => this.toggleScope('product'),\n      togglePortfolio: () => this.toggleScope('portfolio'),\n      toggleChannel: () => this.toggleScope('channel'),\n      toggleTiming: () => this.toggleScope('timing'),\n      toggleRetailer: () => this.toggleScope('retailer'),\n      scopeProduct: dr.scopes.product,\n      scopePortfolio: dr.scopes.portfolio,\n      scopeChannel: dr.scopes.channel,\n      scopeTiming: dr.scopes.timing,\n      scopeRetailer: dr.scopes.retailer,\n      previewText: 'Preview: '+previewIncl+' items would be included',\n      pendingText: dirty ? '● Unapplied changes — Apply to update Relationship & Output' : 'All changes applied',\n      pendingColor: dirty ? '#b5641b' : '#868d94',\n      applyStyle: 'height:32px;padding:0 22px;border-radius:6px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;'\n        + (dirty ? 'background:#0092da;color:#fff;border:1px solid #0092da;box-shadow:0 2px 8px rgba(35,106,125,.3);'\n                 : 'background:#e6eae6;color:#9aa39d;border:1px solid #d7ddd7;'),\n      onApply: () => this.apply(),\n\n      \u002F\u002F output\n      justAppliedOpacity: s.justApplied ? '1' : '0',\n      roiText: Math.round(roi)+'%',\n      netText: this.fmtSigned(net), netColor: net>=0 ? '#5dcd95' : '#d14949',\n      cannibText: Math.round(cannibPct)+'%',\n      confText: Math.round(conf)+'%',\n\n      marginValText: marginErosion.toFixed(1)+'%',\n      marginNote: marginOk ? ('Within '+ap.marginTarget+'% target') : ('Exceeds '+ap.marginTarget+'% target'),\n      marginIcon: marginOk ? '✓' : '⚠',\n      marginBg: marginOk ? '#fff' : '#fbeceb', marginBorder: marginOk ? '#dfe2e6' : '#f2ccc8',\n      marginFg: marginOk ? '#333a41' : '#d14949',\n\n      xbValText: xbLeak.toFixed(1)+'%',\n      xbNote: xbOk ? ('Below '+ap.xborder+'% threshold') : ('Above '+ap.xborder+'% threshold'),\n      xbIcon: xbOk ? '✓' : '⚠',\n      xbBg: xbOk ? '#fff' : '#fbeceb', xbBorder: xbOk ? '#dfe2e6' : '#f2ccc8',\n      xbFg: xbOk ? '#333a41' : '#d14949',\n\n      promoVolText: this.fmtVol(bundleVol), promoNetText: this.fmtSigned(bundleNet),\n      tItems,\n      allSelected,\n      toggleAll: () => this.toggleAllSel(inc, allSelected),\n      tCountText: inc.length+' related + promoted',\n      tVolTotalText: this.fmtVol(bundleVol+volTotal),\n\n      publishedOpacity: s.published ? '1' : '0',\n      publishText: s.published ? ('✓ Published to collaboration workbench · '+s.publishAt) : '',\n      menuOpen: !!s.menuOpen,\n      toggleMenu: () => this.setState(st => ({ menuOpen: !st.menuOpen })),\n      onPublish: () => this.publish('all'),\n      onPublishAll: () => this.publish('all'),\n      onPublishFilter: () => this.publish('filter'),\n      onCancel: () => this.cancel()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
